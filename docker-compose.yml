services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmcrud-backend
    env_file:
      - ./backend/.env.production
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vmcrud-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
