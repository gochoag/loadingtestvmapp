services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmcrud-backend
    environment:
      APP_ENV: ${APP_ENV}
      SERVER_PORT: ${SERVER_PORT}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: vmcrud-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
